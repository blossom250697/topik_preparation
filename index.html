<style>
:root{
  --bg:#F5F3EE;--sur:#FDFCF9;--sur2:#EEEBE4;--bdr:#DDD9CF;--bdrl:#E8E5DC;
  --tx:#1C1A16;--tx2:#6B6257;--tx3:#A09890;
  --grn:#2D5A3D;--grnl:#E8F2EB;--grnm:#7DC98A;
  --pur:#4A3880;--purl:#ECEAF8;--purm:#9B8FD4;
  --gld:#8B6914;--gldl:#F5EDD8;
  --red:#A32D2D;--redl:#FAF0F0;
  --blu:#1A4A7A;--blul:#E8F0FA;
  --r:10px;--rl:16px;
  --sh:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
  --sh2:0 8px 32px rgba(0,0,0,.12);
  --sb-w:240px;
  --fs:15px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans KR",sans-serif;background:var(--bg);color:var(--tx);font-size:var(--fs);line-height:1.65}

/* ── FONT SIZE CONTROLS ── */
.fs-bar{display:flex;align-items:center;gap:6px;background:var(--sur2);border-radius:99px;padding:4px 10px}
.fs-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--bdr);background:var(--sur);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;font-family:"Noto Sans KR",sans-serif}
.fs-btn:hover{background:var(--grnl);border-color:var(--grn);color:var(--grn)}
.fs-label{font-size:12px;color:var(--tx3);min-width:28px;text-align:center}

/* ── LAYOUT ── */
.app{display:flex;min-height:100vh}
.hamburger{display:none;position:fixed;top:12px;left:12px;z-index:300;width:42px;height:42px;border-radius:50%;background:var(--grn);border:none;cursor:pointer;align-items:center;justify-content:center;box-shadow:var(--sh2);flex-direction:column;gap:4px}
.hamburger span{display:block;width:18px;height:2px;background:#fff;border-radius:2px}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:150}
.sidebar{width:var(--sb-w);flex-shrink:0;background:#1C1A16;color:#EEE;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:200;overflow-y:auto;transition:transform .25s}
.main{margin-left:var(--sb-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
.content{padding:16px;max-width:800px;width:100%}

/* ── SIDEBAR ── */
.logo{padding:18px 16px 12px;border-bottom:1px solid rgba(255,255,255,.08)}
.logo-main{font-size:17px;font-weight:700;color:#fff}
.logo-sub{font-size:11px;color:rgba(255,255,255,.35);margin-top:2px}
.logo-exam{font-size:11px;color:var(--grnm);margin-top:5px}
.logo-bar{margin-top:10px;height:3px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden}
.logo-bar-fill{height:100%;background:var(--grnm);border-radius:99px;transition:width .5s}
.nav{flex:1;padding:4px 0 16px;overflow-y:auto}
.nav-section{padding:10px 14px 3px;font-size:10px;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.1em}
.phase-blk{margin:2px 6px}
.phase-hdr{display:flex;align-items:center;padding:7px 10px;border-radius:var(--r);cursor:pointer;color:rgba(255,255,255,.5);font-size:11px;font-weight:600;transition:.15s;user-select:none}
.phase-hdr:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.85)}
.phase-hdr.open{color:var(--grnm)}
.phase-arr{margin-left:auto;font-size:10px;transition:transform .2s}
.phase-hdr.open .phase-arr{transform:rotate(90deg)}
.day-list{display:none;padding-left:2px}
.phase-hdr.open+.day-list{display:block}
.day-btn{display:flex;align-items:center;gap:6px;width:100%;padding:5px 10px;border:none;background:transparent;color:rgba(255,255,255,.4);font-size:11px;font-family:"Noto Sans KR",sans-serif;cursor:pointer;border-radius:var(--r);transition:.15s;text-align:left;border-left:2px solid transparent;min-height:32px}
.day-btn:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.04)}
.day-btn.active{color:#fff;border-left-color:var(--grnm);background:rgba(255,255,255,.07)}
.day-btn.rev{color:rgba(255,255,255,.3);font-style:italic}
.day-btn.done .dck{display:inline}
.dck{display:none;margin-left:auto;color:var(--grnm);font-size:10px}
.dnum{width:16px;text-align:center;font-size:10px;opacity:.35;flex-shrink:0}
.dlbl{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* Exam and teacher in sidebar */
.sb-special{margin:6px 6px 0;border-top:1px solid rgba(255,255,255,.08);padding-top:6px}
.sb-btn{display:flex;align-items:center;gap:8px;width:100%;padding:8px 10px;border:none;background:transparent;color:rgba(255,255,255,.5);font-size:11px;font-family:"Noto Sans KR",sans-serif;cursor:pointer;border-radius:var(--r);transition:.15s;text-align:left}
.sb-btn:hover{background:rgba(255,255,255,.06);color:#fff}
.sb-btn.active{background:rgba(125,201,138,.15);color:var(--grnm)}

/* ── TOPBAR ── */
.topbar{background:var(--sur);border-bottom:1px solid var(--bdrl);padding:12px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50}
.topbar-l{flex:1;min-width:0}
.pg-title{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pg-sub{font-size:12px;color:var(--tx3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-r{display:flex;gap:6px;align-items:center;flex-shrink:0}

/* ── SYNC STATUS ── */
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--tx3)}
.sync-dot.ok{background:var(--grnm)}
.sync-dot.err{background:#E06060}
.sync-dot.syncing{background:#F0C040;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 16px;border-radius:var(--r);font-size:14px;font-family:"Noto Sans KR",sans-serif;font-weight:500;cursor:pointer;border:1px solid var(--bdr);background:var(--sur);color:var(--tx);transition:.15s;touch-action:manipulation}
.btn:hover{background:var(--sur2)}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--grn);color:#fff;border-color:var(--grn)}
.btn-p:hover{background:#234a31}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-ghost{background:transparent;border:none;color:var(--tx2);padding:6px 10px}
.btn-full{width:100%}
.btn-warn{background:#C04040;color:#fff;border-color:#C04040}

/* ── TABS ── */
.tabs{display:flex;background:var(--sur2);border-radius:var(--r);margin-bottom:16px;padding:3px;gap:2px}
.tab{flex:1;padding:7px 4px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;border-radius:8px;color:var(--tx2);border:none;background:transparent;font-family:"Noto Sans KR",sans-serif;transition:.15s;touch-action:manipulation}
.tab.active{background:var(--sur);color:var(--grn);box-shadow:var(--sh)}

/* ── CARDS ── */
.card{background:var(--sur);border:1px solid var(--bdrl);border-radius:var(--rl);padding:16px;margin-bottom:12px;box-shadow:var(--sh)}
.card-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);margin-bottom:12px}

/* ── HERO ── */
.hero{border-radius:var(--rl);padding:18px;color:#fff;margin-bottom:12px;position:relative;overflow:hidden}
.hero-grn{background:linear-gradient(135deg,var(--grn),#1a3d2a)}
.hero-pur{background:linear-gradient(135deg,var(--pur),#2d1f5e)}
.hero-blu{background:linear-gradient(135deg,var(--blu),#0d2d50)}
.hero-gld{background:linear-gradient(135deg,#8B6914,#5a420a)}
.hero::before{content:"";position:absolute;right:-16px;top:-16px;width:80px;height:80px;background:rgba(255,255,255,.05);border-radius:50%}
.hero-title{font-size:18px;font-weight:700;margin-bottom:3px}
.hero-sub{font-size:13px;opacity:.75}

/* ── GRAMMAR ── */
.g-form{font-size:22px;font-weight:700;margin-bottom:2px}
.g-tr{font-size:13px;opacity:.75;font-style:italic}
.feel-box{background:var(--gldl);border:1px solid #D4B56A;border-radius:var(--r);padding:10px 12px;margin-bottom:10px}
.feel-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--gld);margin-bottom:3px}
.rule-box{background:var(--blul);border:1px solid #A8C4E8;border-radius:var(--r);padding:10px 12px;margin-bottom:10px;font-size:14px;line-height:1.7}
.rule-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--blu);margin-bottom:3px}
.contrast-box{background:var(--redl);border:1px solid #E8BBBB;border-radius:var(--r);padding:8px 12px;margin-bottom:10px;font-size:13px;color:var(--red);line-height:1.6}
.ex-item{padding:8px 0;border-bottom:1px solid var(--bdrl)}
.ex-item:last-child{border:none}
.ex-kr{font-size:15px}
.ex-ru{font-size:13px;color:var(--tx3);font-style:italic;margin-top:1px}
.g-nav{display:flex;gap:7px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
.g-dot{width:10px;height:10px;border-radius:50%;background:var(--bdr);cursor:pointer;transition:.15s;flex-shrink:0;touch-action:manipulation}
.g-dot.active{background:var(--grn);transform:scale(1.3)}
.g-dot.seen{background:var(--grnm)}
.g-lbl{font-size:12px;color:var(--tx3);margin-left:4px}

/* ── VOCAB ── */
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:14px}
.vt{background:var(--sur);border:1px solid var(--bdrl);border-radius:var(--r);padding:10px 12px;cursor:pointer;transition:.15s;box-shadow:var(--sh);touch-action:manipulation;user-select:none;position:relative}
.vt:active{transform:scale(.97)}
.vt.flip .vt-kr,.vt.flip .vt-ctx{display:none}
.vt.flip .vt-ru{display:block}
.vt-kr{font-size:14px;font-weight:700;color:var(--grn)}
.vt-ctx{font-size:11px;color:var(--tx3);margin-top:2px}
.vt-ru{display:none;font-size:13px;color:var(--tx2);line-height:1.5}

/* ── SPEAK BUTTON ── */
.spk-btn{position:absolute;top:6px;right:6px;width:24px;height:24px;border-radius:50%;border:none;background:var(--grnl);color:var(--grn);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;touch-action:manipulation;opacity:.7}
.spk-btn:hover,.spk-btn:active{opacity:1;background:var(--grnm);color:#fff}
.spk-inline{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;border:1px solid var(--bdr);background:var(--grnl);color:var(--grn);font-size:14px;cursor:pointer;transition:.15s;touch-action:manipulation;vertical-align:middle;margin-left:6px;flex-shrink:0}
.spk-inline:hover{background:var(--grnm);color:#fff;border-color:var(--grnm)}

/* ── EXERCISES ── */
.prog-bar{height:4px;background:var(--bdrl);border-radius:99px;margin-bottom:14px;overflow:hidden}
.prog-fill{height:100%;background:var(--grn);border-radius:99px;transition:width .4s}
.ex-ctr{font-size:12px;color:var(--tx3);display:flex;justify-content:space-between;margin-bottom:6px}
.ex-card{background:var(--sur);border:1px solid var(--bdrl);border-radius:var(--rl);padding:18px;box-shadow:var(--sh)}
.ex-badge{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:2px 8px;border-radius:4px;margin-bottom:10px}
.ex-q{font-size:15px;line-height:1.7;margin-bottom:14px;display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap}
.blank-inp{border:none;border-bottom:2px solid var(--grn);background:transparent;font-size:15px;font-family:"Noto Sans KR",sans-serif;color:var(--grn);padding:0 4px;width:140px;text-align:center}
.blank-inp:focus{outline:none}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{width:100%;text-align:left;padding:11px 14px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--bg);font-size:14px;font-family:"Noto Sans KR",sans-serif;color:var(--tx);cursor:pointer;transition:.15s;line-height:1.5;touch-action:manipulation}
.opt:active{transform:scale(.98)}
.opt.sel{border-color:var(--pur);background:var(--purl);color:var(--pur)}
.opt.ok{border-color:var(--grn);background:var(--grnl);color:var(--grn);font-weight:500}
.opt.err{border-color:var(--red);background:var(--redl);color:var(--red)}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}
.chip{padding:7px 13px;border:1px solid var(--bdr);border-radius:99px;background:var(--bg);font-size:14px;font-family:"Noto Sans KR",sans-serif;cursor:pointer;transition:.15s;user-select:none;touch-action:manipulation}
.chip:active{transform:scale(.95)}
.chip.used{opacity:.2;pointer-events:none}
.drop-zone{min-height:46px;border:1.5px dashed var(--bdr);border-radius:var(--r);padding:8px 12px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;cursor:pointer}
.drop-chip{padding:5px 12px;border-radius:99px;background:var(--purl);border:1px solid var(--purm);color:var(--pur);font-size:14px;cursor:pointer}
.drop-hint{font-size:12px;color:var(--tx3);font-style:italic}
.trans-inp{width:100%;padding:10px 12px;border:1px solid var(--bdr);border-radius:var(--r);font-size:14px;font-family:"Noto Sans KR",sans-serif;color:var(--tx);background:var(--bg);resize:none;-webkit-appearance:none}
.trans-inp:focus{outline:none;border-color:var(--grn)}
.hint-pill{display:inline-block;background:var(--gldl);border:1px solid #D4B56A;border-radius:var(--r);padding:5px 10px;font-size:12px;color:var(--gld);margin-top:6px}
.hint-btn{display:inline-flex;align-items:center;gap:4px;margin-top:8px;padding:5px 12px;border-radius:99px;font-size:12px;font-family:"Noto Sans KR",sans-serif;font-weight:500;cursor:pointer;border:1px solid #D4B56A;background:var(--gldl);color:var(--gld);transition:.15s;touch-action:manipulation}
.hint-btn:active{transform:scale(.96)}
.feedback{margin-top:12px;padding:10px 14px;border-radius:var(--r);font-size:14px;font-weight:500;display:none}
.feedback.ok{background:var(--grnl);color:var(--grn)}
.feedback.err{background:var(--redl);color:var(--red)}

/* ── LISTEN ── */
.listen-hero{background:linear-gradient(135deg,var(--blu),#0d2d50);border-radius:var(--rl);padding:24px 20px;text-align:center;color:#fff;margin-bottom:14px}
.listen-play{width:72px;height:72px;border-radius:50%;border:3px solid rgba(255,255,255,.3);background:rgba(255,255,255,.12);font-size:28px;cursor:pointer;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;transition:.2s;touch-action:manipulation}
.listen-play:hover{background:rgba(255,255,255,.22)}
.listen-play:active{transform:scale(.93)}
.listen-play.playing{animation:pulse 1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,.3)}50%{box-shadow:0 0 0 10px rgba(255,255,255,0)}}

/* ── RESULTS ── */
.res-wrap{text-align:center;padding:32px 16px}
.res-circle{width:100px;height:100px;border-radius:50%;border:3px solid var(--grn);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 16px}
.res-n{font-size:30px;font-weight:700;color:var(--grn);line-height:1}
.res-d{font-size:12px;color:var(--tx3)}
.res-msg{font-size:18px;font-weight:700;margin-bottom:5px}
.res-sub{font-size:14px;color:var(--tx2);margin-bottom:22px}

/* ── HOME ── */
.home-hero{background:linear-gradient(135deg,#1C1A16,var(--grn));border-radius:var(--rl);padding:22px;color:#fff;margin-bottom:14px}
.hh-t{font-size:22px;font-weight:700;margin-bottom:4px}
.hh-s{font-size:13px;opacity:.7;margin-bottom:16px}
.stats{display:flex;gap:10px;flex-wrap:wrap}
.stat{background:rgba(255,255,255,.08);border-radius:var(--r);padding:10px 14px;min-width:70px}
.stat-n{font-size:20px;font-weight:700;color:var(--grnm)}
.stat-l{font-size:11px;opacity:.55;margin-top:1px}
.pc{background:var(--sur);border:1px solid var(--bdrl);border-radius:var(--rl);padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:12px;box-shadow:var(--sh);touch-action:manipulation}
.pc:active{transform:scale(.98)}
.pc-icon{font-size:24px;flex-shrink:0}
.pc-t{font-size:14px;font-weight:700}
.pc-m{font-size:12px;color:var(--tx3);margin-top:2px}

/* ── REVIEW GRID ── */
.rev-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-bottom:12px}
.ri{background:var(--sur);border:1px solid var(--bdrl);border-radius:var(--r);padding:10px 12px;cursor:pointer;transition:.15s;touch-action:manipulation}
.ri:active{transform:scale(.97)}
.ri-form{font-size:13px;font-weight:700;color:var(--grn)}
.ri-tr{font-size:11px;color:var(--tx3);margin-top:2px}

/* ── MODAL ── */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;display:flex;align-items:flex-end;justify-content:center;padding:0}
.modal{background:var(--sur);border-radius:var(--rl) var(--rl) 0 0;width:100%;max-width:600px;padding:22px;max-height:85vh;overflow-y:auto}
@media(min-width:600px){.modal-ov{align-items:center;padding:20px}.modal{border-radius:var(--rl);max-height:80vh}}

/* ── EXAM ── */
.exam-q{background:var(--sur);border:1px solid var(--bdrl);border-radius:var(--rl);padding:16px;margin-bottom:12px;box-shadow:var(--sh)}
.exam-q-num{font-size:11px;font-weight:700;text-transform:uppercase;color:var(--tx3);margin-bottom:8px}
.exam-text{background:var(--sur2);border-radius:var(--r);padding:12px 14px;font-size:14px;line-height:1.8;margin-bottom:12px;border:1px solid var(--bdrl)}
.audio-btn{display:flex;align-items:center;gap:8px;padding:10px 16px;border:1px solid var(--blu);border-radius:var(--r);background:var(--blul);color:var(--blu);font-size:14px;cursor:pointer;transition:.15s;font-family:"Noto Sans KR",sans-serif;font-weight:500;margin-bottom:12px;touch-action:manipulation}
.audio-btn:hover{background:#D0E4F8}
.audio-btn.playing{animation:audioPulse .8s infinite}
@keyframes audioPulse{0%,100%{box-shadow:0 0 0 0 rgba(26,74,122,.2)}50%{box-shadow:0 0 0 6px rgba(26,74,122,0)}}
.exam-timer{font-size:13px;font-weight:700;color:var(--red);margin-left:auto}

/* ── TEACHER DASHBOARD ── */
.teacher-lock{text-align:center;padding:40px 20px}
.teacher-pin{width:140px;padding:12px;font-size:20px;text-align:center;border:2px solid var(--bdr);border-radius:var(--r);font-family:"IBM Plex Mono",monospace;letter-spacing:8px}
.teacher-pin:focus{outline:none;border-color:var(--grn)}
.t-stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.t-stat{background:var(--sur);border:1px solid var(--bdrl);border-radius:var(--rl);padding:16px;text-align:center;box-shadow:var(--sh)}
.t-stat-n{font-size:28px;font-weight:700;color:var(--grn);line-height:1}
.t-stat-l{font-size:12px;color:var(--tx3);margin-top:4px}
.t-row{display:flex;align-items:center;padding:10px 12px;border-bottom:1px solid var(--bdrl);gap:10px;font-size:14px}
.t-row:last-child{border:none}
.t-badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700}
.t-badge-ok{background:var(--grnl);color:var(--grn)}

  ];
  // We use a simple iframe trick for Google Drive
  if(btn){btn.classList.add('playing');}
  try{
    if(!audioEl){audioEl=new Audio();}
    // Try direct Drive download with file listing
    // Since we have folder ID, attempt to find files
    audioEl.src=`https://docs.google.com/uc?export=open&id=${GDRIVE_FOLDER}`;
    // Better: Use direct file link pattern
    // User should upload individual files - for now show message
    audioEl.onended=()=>{if(btn)btn.classList.remove('playing');};
    audioEl.onerror=()=>{
      if(btn)btn.classList.remove('playing');
      showAudioHelper(num);
    };
    await audioEl.play();
  }catch(e){
    if(btn)btn.classList.remove('playing');
    showAudioHelper(num);
  }
}

function showAudioHelper(num){
  const overlay=document.createElement('div');
  overlay.className='modal-ov';
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove();};
  overlay.innerHTML=`<div class="modal">
    <div style="font-size:18px;font-weight:700;margin-bottom:12px">🔊 Вопрос ${num} — аудио</div>
    <p style="font-size:14px;color:var(--tx2);margin-bottom:16px">

// TTS for vocabulary
function speak(text,rate=0.85){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ko-KR';u.rate=rate;
  const v=window.speechSynthesis.getVoices().find(x=>x.lang==='ko-KR'||x.lang==='ko');
  if(v)u.voice=v;
  window.speechSynthesis.speak(u);
  return u;
}
function speakAndAnimate(text,btn){
  const u=speak(text);
  if(u&&btn){btn.classList.add('playing');u.onend=()=>btn.classList.remove('playing');}
}
if(window.speechSynthesis){
  window.speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();
}

function renderGTab(forms,blocks){
  const isL=blocks.some(b=>b.includes('듣기'));
  const known=forms.filter(f=>GDB[f]);
  const unknown=forms.filter(f=>!GDB[f]);
  if(!forms.length) return`<div style="text-align:center;padding:32px;color:var(--tx3)">Грамматика не добавлена</div>`;
  let html=`<span class="sec-badge ${isL?'sec-l':'sec-r'}">${isL?'🎧 듣기':'📖 읽기'}</span>`;
  html+=`<div class="g-nav">`;
  known.forEach((f,i)=>{html+=`<div class="g-dot ${i===S.gIdx?'active':''} ${i<S.gIdx?'seen':''}" onclick="goG(${i})"></div>`;});
  if(known.length) html+=`<span class="g-lbl">${S.gIdx+1}/${known.length}</span>`;
  html+=`</div>`;
  if(!known.length){
    html+=`<div class="card"><div class="card-hdr">Конструкции дня</div>`;
    forms.forEach(f=>{html+=`<div style="padding:7px 0;border-bottom:1px solid var(--bdrl);font-weight:700;color:var(--grn)">${f}</div>`;});
    html+=`</div>`;
  } else {
    const form=known[S.gIdx];const g=GDB[form];
    html+=`<div class="hero hero-grn"><div class="g-form">${form}</div><div class="g-tr">${g.translation}</div></div>`;
    html+=`<div class="feel-box"><div class="feel-lbl">💡 Ощущение</div><div style="font-size:14px;line-height:1.6">${g.feel}</div></div>`;
    html+=`<div class="rule-box"><div class="rule-lbl">📐 Правило</div>${g.rule}</div>`;
    if(g.contrast) html+=`<div class="contrast-box">⚠️ ${g.contrast}</div>`;
    html+=`<div class="card"><div class="card-hdr">Примеры</div>`;
    g.examples.forEach(ex=>{html+=`<div class="ex-item"><div class="ex-kr">${ex.kr}</div><div class="ex-ru">${ex.ru}</div></div>`;});
    html+=`</div>`;
    html+=`<div style="display:flex;gap:8px;flex-wrap:wrap">`;
    if(S.gIdx>0) html+=`<button class="btn btn-sm" onclick="goG(${S.gIdx-1})">← Назад</button>`;
    if(S.gIdx<known.length-1) html+=`<button class="btn btn-p btn-sm" onclick="goG(${S.gIdx+1})">Следующая →</button>`;
    else html+=`<button class="btn btn-p btn-sm" onclick="switchTab('vocab')">К словам 🔤</button>`;
    html+=`</div>`;
  }
  if(unknown.length){html+=`<div class="card" style="margin-top:12px"><div class="card-hdr">Также в блоке</div>`;unknown.forEach(f=>{html+=`<div style="padding:6px 0;border-bottom:1px solid var(--bdrl);color:var(--grn);font-size:13px;font-weight:500">${f}</div>`;});html+=`</div>`;}
  return html;
}

// ─── EXERCISES ───
function buildExList(gForms,vocab){
  let list=[];
  gForms.forEach(form=>{const g=GDB[form];if(!g||!g.exercises)return;g.exercises.forEach(ex=>list.push({...ex,src:'grammar',form}));});
  const sample=shuffle(vocab).slice(0,Math.min(10,vocab.length));
  sample.forEach(w=>{
    list.push({type:'vocab-fill',src:'vocab',q:w.kr,a:w.ru,hint:w.ctx||''});
    const dist=shuffle(vocab.filter(x=>x.kr!==w.kr)).slice(0,3);
    if(dist.length===3){
      const opts=shuffle([{text:w.kr,correct:true},...dist.map(d=>({text:d.kr,correct:false}))]);
      list.push({type:'vocab-choice',src:'vocab',q:`«${w.ru}» — как по-корейски?`,opts,correctKr:w.kr});
    }
    const distRu=shuffle(vocab.filter(x=>x.kr!==w.kr)).slice(0,3);
    if(distRu.length===3){
      const opts=shuffle([{text:w.ru,correct:true},...distRu.map(d=>({text:d.ru,correct:false}))]);
      list.push({type:'listen-choice',src:'vocab',kr:w.kr,q:'Что означает это слово?',opts});
    }
    list.push({type:'listen-fill',src:'vocab',kr:w.kr,a:w.kr,ru:w.ru});
  });
  const prev=getPrevBlocks(S.day);
  if(prev.length){const pv=shuffle(prev.flatMap(b=>VOCAB[b]||[])).slice(0,6);pv.forEach(w=>list.push({type:'vocab-fill',src:'review',q:w.kr,a:w.ru,hint:'Повтор: '+w.ctx}));}
  return shuffle(list);
}
function getPrevBlocks(day){
  return PLAN.block_order.filter(b=>{
    const e=Object.entries(PLAN.day_to_block).find(([,bs])=>bs.includes(b));
    if(!e)return false;return parseInt(e[0])<day;
  });
}

    html+=`<textarea class="trans-inp" id="mi" rows="2" placeholder="Введите перевод..."></textarea>`;
    if(ex.hint)html+=`<button class="hint-btn" onclick="showHint(this,'${ex.hint.replace(/'/g,"\'")}')">💡 Подсказка</button><div class="hint-pill" style="display:none"></div>`;
  } else if(ex.type==='choice'||ex.type==='vocab-choice'){
    const hasKr=ex.correctKr;
    const krEsc=hasKr?ex.correctKr.replace(/'/g,"\'"):'';
    html+=`<div class="ex-q"><span>${ex.q}</span>${hasKr?`<button class="spk-inline" onclick="speak('${krEsc}')" title="🔊">🔊</button>`:''}</div>`;
    html+=`<div class="opts">`;
    ex.opts.forEach((o,i)=>{html+=`<button class="opt" id="opt-${i}" onclick="selO(${i})">${o.text}</button>`;});
    html+=`</div>`;

    html+=`<div class="listen-hero">

    html+=`<div class="listen-hero">

      <div style="font-size:13px;opacity:.75">Прослушайте и напишите по-корейски</div>
    </div><div class="ex-q" style="font-style:italic;color:var(--tx2)">${ex.ru}</div>`;
    html+=`<input class="blank-inp" id="mi" placeholder="한국어로..." autocomplete="off" style="width:100%;text-align:left;font-size:15px;padding:8px 0">`;
  } else if(ex.type==='compose'){
    const shuf=shuffle([...ex.words]);
    html+=`<div class="chips" id="chips">`;shuf.forEach((w,i)=>{html+=`<span class="chip" id="chip-${i}" onclick="addChip(this,'${w.replace(/'/g,"\'")}',${i})">${w}</span>`;});
    html+=`</div><div class="drop-zone" id="drop" onclick="removeLastChip()"><span class="drop-hint" id="dh">Нажмите слова выше · Здесь — убрать последнее</span></div>`;

function startEx(){

  const gForms=blocks.flatMap(b=>GB[b]||[]);

function addChip(el,word,idx){if(el.classList.contains('used'))return;el.classList.add('used');S.composed.push({el,word});const drop=document.getElementById('drop');document.getElementById('dh')&&(document.getElementById('dh').style.display='none');const ch=document.createElement('span');ch.className='drop-chip';ch.textContent=word;drop.appendChild(ch);}
function removeLastChip(){if(!S.composed.length)return;const last=S.composed.pop();last.el.classList.remove('used');const drop=document.getElementById('drop');drop.querySelectorAll('.drop-chip').item(drop.querySelectorAll('.drop-chip').length-1)?.remove();if(!S.composed.length){const h=document.getElementById('dh');if(h)h.style.display='';}}

function checkAns(){
  const ex=S.exList[S.exIdx];
  let ok=false,fbTxt='';
  if(ex.type==='fill'){
    const v=(document.getElementById('mi')?.value||'').trim();
    ok=v.toLowerCase()===ex.a.toLowerCase();
    fbTxt=ok?'✓ Правильно!':'✗ Неверно. Правильно: '+ex.a;
    if(document.getElementById('mi'))document.getElementById('mi').disabled=true;
  } else if(ex.type==='vocab-fill'){
    const v=(document.getElementById('mi')?.value||'').trim().toLowerCase();
    ok=v===ex.a.toLowerCase()||(ex.a.toLowerCase().includes(v)&&v.length>2);
    fbTxt=ok?'✓ Правильно!':'✗ Неверно. Правильно: '+ex.a;
    if(document.getElementById('mi'))document.getElementById('mi').disabled=true;
  } else if(ex.type==='choice'||ex.type==='vocab-choice'||ex.type==='listen-choice'){
    if(S.selOpt===null){alert('Выберите вариант');return;}
    ok=ex.opts[S.selOpt].correct;
    ex.opts.forEach((o,i)=>{const b=document.getElementById('opt-'+i);if(!b)return;if(o.correct)b.classList.add('ok');else if(i===S.selOpt&&!o.correct)b.classList.add('err');b.disabled=true;});
    fbTxt=ok?'✓ Правильно!':'✗ Неверно. Правильный — зелёный.';
  } else if(ex.type==='listen-fill'){
    const v=(document.getElementById('mi')?.value||'').trim();
    const norm=s=>s.replace(/[\s·]/g,'').toLowerCase();
    ok=norm(v)===norm(ex.a);
    fbTxt=ok?'✓ Правильно! 잘 했어요! 🎉':'✗ Неверно. Правильно: '+ex.a;
    if(document.getElementById('mi'))document.getElementById('mi').disabled=true;
    if(!ok)setTimeout(()=>speak(ex.a),600);
  } else if(ex.type==='compose'){
    const c=S.composed.map(x=>x.word).join(' ');ok=c.trim()===ex.a.trim();fbTxt=ok?'✓ Правильно!':'✗ Неверно. Правильно: '+ex.a;
  } else if(ex.type==='translate'){
    const v=(document.getElementById('mi')?.value||'').trim().toLowerCase();
    ok=v===ex.a.toLowerCase()||(ex.alt||[]).some(a=>v===a.toLowerCase());
    fbTxt=ok?'✓ Правильно!':'✗ Неверно. Правильно: '+ex.a;
    if(document.getElementById('mi'))document.getElementById('mi').disabled=true;
  }
  if(ok)S.exScore++;
  else{const key=ex.form||ex.q;S.mistakes[key]=(S.mistakes[key]||0)+1;if(syncTimeout)clearTimeout(syncTimeout);syncTimeout=setTimeout(saveToFirebase,3000);}
  const fb=document.getElementById('fb');
  if(fb){fb.className='feedback '+(ok?'ok':'err');fb.textContent=fbTxt;fb.style.display='block';}
  const cb=document.getElementById('cb');const nb=document.getElementById('nb');
  if(cb)cb.style.display='none';
  if(nb){nb.style.display='inline-flex';nb.textContent=S.exIdx===S.exList.length-1?'Завершить ✓':'Далее →';}
}

function nextEx(){

function renderRes(){

// ─── MISTAKE REVIEW ───
function openMistakeReview(specificKey){
  const keys=specificKey?[specificKey]:Object.keys(S.mistakes).filter(k=>S.mistakes[k]>0);
  if(!keys.length){alert('Ошибок нет! 🎉');return;}
  setTopbar('🔎 Работа над ошибками','Повторение проблемных мест');
  let html=`<div class="hero hero-gld"><div class="hero-title">🔎 Работа над ошибками</div>
    <div class="hero-sub">${keys.length} тем требуют внимания</div></div>`;
  keys.slice(0,10).forEach(key=>{
    const cnt=S.mistakes[key]||0;
    const g=GDB[key];
    html+=`<div class="mistake-card">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div style="font-size:16px;font-weight:700;color:var(--grn);flex:1">${key}</div>
        <span style="font-size:12px;font-weight:700;color:var(--red);background:var(--redl);padding:2px 8px;border-radius:99px">${cnt}× ошибок</span>
        <button class="btn btn-sm" onclick="resetMistake('${key.replace(/'/g,"\'")}')">Сбросить</button>
      </div>`;
    if(g){
      html+=`<div class="mistake-explain">
        <strong>${g.translation}</strong><br>
        <span style="font-size:13px;opacity:.8">${g.feel}</span><br><br>
        ${g.examples.slice(0,2).map(ex=>`<div style="margin-bottom:6px"><div>${ex.kr}</div><div style="font-size:12px;opacity:.7;font-style:italic">${ex.ru}</div></div>`).join('')}
      </div>`;
      if(g.exercises&&g.exercises.length){
        const ex=g.exercises[0];
        html+=`<div style="margin-top:10px;font-size:13px;color:var(--tx2)">
          <strong>Упражнение:</strong> ${ex.q||ex.hint||''}<br>
          <em>Ответ: ${ex.a}</em>
        </div>`;
      }
    } else {
      // Vocab mistake
      const wordEntry=Object.values(VOCAB).flat().find(w=>w.kr===key);
      if(wordEntry){
        html+=`<div class="mistake-explain">
          <strong>${wordEntry.ru}</strong><br>
          <span style="font-size:13px;opacity:.8">${wordEntry.ctx||''}</span>
          <button class="spk-inline" onclick="speak('${key.replace(/'/g,"\'")}')">🔊</button>
        </div>`;
      }
    }
    html+=`</div>`;
  });
  html+=`<button class="btn btn-ghost" onclick="goHome()">← Назад</button>`;
  document.getElementById('content').innerHTML=html;
}

function resetMistake(key){
  delete S.mistakes[key];
  saveToFirebase();
  openMistakeReview(null);
}

function showExamSection(section){
  document.querySelectorAll('#exam-tabs .tab').forEach((t,i)=>{
    t.classList.toggle('active',['listening','reading','results'][i]===section);
  });
  const ec=document.getElementById('exam-content');
  if(!ec)return;
  if(section==='results'){renderExamResults();return;}
  const qs=section==='listening'?EXAM.listening_qs:EXAM.reading_qs;
  const answers=EXAM.answers[section];
  let html='';
  const qNums=Object.keys(qs).map(Number).sort((a,b)=>a-b);
  qNums.forEach(num=>{
    const q=qs[num];
    const saved=S.examAnswers[section+'_'+num];
    html+=`<div class="exam-q">
      <div class="exam-q-num">문제 ${num} <span style="color:var(--tx3);font-weight:400">(각 2점)</span></div>`;
    if(section==='listening'){
      html+=`<button class="audio-btn" onclick="playAudio(${num},this)">
        🎵 듣기 ${num}번 재생
        <span style="margin-left:auto;font-size:12px;color:var(--tx3)">클릭하여 재생</span>
      </button>`;
    }
    if(q.instruction) html+=`<div style="font-size:13px;color:var(--tx3);margin-bottom:8px">${q.instruction}</div>`;
    if(q.text) html+=`<div class="exam-text">${q.text.replace(/\n/g,'<br>')}</div>`;
    if(q.given) html+=`<div class="exam-text" style="border-left:3px solid var(--pur);background:var(--purl)"><strong>주어진 문장:</strong> ${q.given}</div>`;
    html+=`<div class="opts" style="margin-top:8px">`;
    (q.opts||[]).forEach((opt,i)=>{
      const chosen=saved===i+1;
      html+=`<button class="opt ${chosen?'sel':''}" onclick="selectExamAnswer('${section}',${num},${i+1},this)">${['①','②','③','④'][i]} ${opt}</button>`;
    });
    html+=`</div></div>`;
  });
  html+=`<div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
    <button class="btn btn-p" onclick="submitExamSection('${section}')">✓ Сдать ${section==='listening'?'듣기':'읽기'}</button>
  </div>`;
  ec.innerHTML=html;
}

function selectExamAnswer(section,num,answer,btn){
  S.examAnswers[section+'_'+num]=answer;
  // Update UI
  btn.closest('.opts').querySelectorAll('.opt').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
}

async function submitExamSection(section){
  const qs=section==='listening'?EXAM.listening_qs:EXAM.reading_qs;
  const answers=EXAM.answers[section];
  const qNums=Object.keys(qs).map(Number);
  let score=0,total=qNums.length*2;
  const wrong=[];
  qNums.forEach(num=>{
    const chosen=S.examAnswers[section+'_'+num];
    if(chosen===answers[num])score+=2;
    else wrong.push(num);
  });
  // Save mistakes
  wrong.forEach(num=>{
    const key=`시험 ${section==='listening'?'듣기':'읽기'} Q${num}`;
    S.mistakes[key]=(S.mistakes[key]||0)+1;
  });
  await saveExamResult(section,S.examAnswers,score,total);
  await saveToFirebase();
  showExamSection('results');
}

function renderExamResults(){
  const ec=document.getElementById('exam-content');
  if(!ec)return;
  // Calculate scores
  let lScore=0,lTotal=0,rScore=0,rTotal=0;
  Object.keys(EXAM.listening_qs).forEach(num=>{
    const chosen=S.examAnswers['listening_'+num];
    const correct=EXAM.answers.listening[num];
    if(chosen!==undefined){lTotal+=2;if(chosen===correct)lScore+=2;}
  });
  Object.keys(EXAM.reading_qs).forEach(num=>{
    const chosen=S.examAnswers['reading_'+num];
    const correct=EXAM.answers.reading[num];
    if(chosen!==undefined){rTotal+=2;if(chosen===correct)rScore+=2;}
  });
  const lPct=lTotal?Math.round(lScore/lTotal*100):0;
  const rPct=rTotal?Math.round(rScore/rTotal*100):0;
  const level=lPct>=80&&rPct>=80?'6급':lPct>=70&&rPct>=70?'5급':lPct>=60&&rPct>=60?'4급':lPct>=50&&rPct>=50?'3급':'요 기준 미달';
  let html=`<div class="card">
    <div class="card-hdr">📊 Результаты теста</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
      <div class="t-stat"><div class="t-stat-n" style="color:var(--blu)">${lScore}</div><div class="t-stat-l">듣기 / ${lTotal||100}점</div></div>
      <div class="t-stat"><div class="t-stat-n" style="color:var(--gld)">${rScore}</div><div class="t-stat-l">읽기 / ${rTotal||100}점</div></div>
    </div>
    <div style="text-align:center;padding:12px;background:var(--grnl);border-radius:var(--r);margin-bottom:16px">
      <div style="font-size:24px;font-weight:700;color:var(--grn)">${lScore+rScore}점</div>
      <div style="font-size:13px;color:var(--tx2)">총점 · 예상 등급: <strong>${level}</strong></div>
    </div>
    <div style="font-size:13px;color:var(--tx2);text-align:center">⚠️ Ответы доступны только в кабинете учителя</div>
  </div>`;
  // Wrong questions (without showing correct answers)
  const wrongNums=[];
  Object.keys(EXAM.listening_qs).forEach(num=>{const c=S.examAnswers['listening_'+num];if(c&&c!==EXAM.answers.listening[num])wrongNums.push({section:'듣기',num:parseInt(num)});});
  Object.keys(EXAM.reading_qs).forEach(num=>{const c=S.examAnswers['reading_'+num];if(c&&c!==EXAM.answers.reading[num])wrongNums.push({section:'읽기',num:parseInt(num)});});
  if(wrongNums.length){
    html+=`<div class="card" style="border-left:3px solid var(--red)">
      <div class="card-hdr">❌ Неверные ответы (${wrongNums.length})</div>
      <div style="font-size:13px;color:var(--tx2);margin-bottom:8px">Правильные ответы — в кабинете учителя</div>`;
    wrongNums.forEach(({section,num})=>{
      html+=`<div class="t-row"><span>${section} ${num}번</span><span class="t-badge t-badge-err">✗</span></div>`;
    });
    html+=`</div>`;
  }
  ec.innerHTML=html;
}

function renderTeacherDashboard(studentData,examResults){
  const done=(studentData.done||[]).length;
  const mistakes=studentData.mistakes||{};
  const mistakesSorted=Object.entries(mistakes).sort((a,b)=>b[1]-a[1]);
  const totalMistakes=Object.values(mistakes).reduce((a,b)=>a+b,0);
  let html=`<div class="hero hero-grn"><div class="hero-title">👩‍🏫 Кабинет учителя</div>
    <div class="hero-sub">Прогресс Кати · Обновлено только что</div></div>`;
  // Stats
  html+=`<div class="t-stat-grid">
    <div class="t-stat"><div class="t-stat-n">${done}</div><div class="t-stat-l">дней пройдено / 45</div></div>
    <div class="t-stat"><div class="t-stat-n">${Math.round(done/45*100)}%</div><div class="t-stat-l">прогресс курса</div></div>
    <div class="t-stat"><div class="t-stat-n">${totalMistakes}</div><div class="t-stat-l">ошибок всего</div></div>
    <div class="t-stat"><div class="t-stat-n">${mistakesSorted.length}</div><div class="t-stat-l">проблемных тем</div></div>
  </div>`;
  // Weak areas
  if(mistakesSorted.length){
    html+=`<div class="card"><div class="card-hdr">⚠️ Слабые места (по убыванию ошибок)</div>`;
    const maxErr=mistakesSorted[0]?.[1]||1;
    mistakesSorted.slice(0,15).forEach(([key,cnt])=>{
      const pct=Math.round(cnt/maxErr*100);
      const color=cnt>=5?'var(--red)':cnt>=3?'var(--gld)':'var(--grn)';
      html+=`<div class="weak-item">
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${key}</div>
          <div class="weak-bar"><div class="weak-bar-fill" style="width:${pct}%;background:${color}"></div></div>
        </div>
        <span style="font-size:13px;font-weight:700;color:${color};flex-shrink:0">${cnt}×</span>
      </div>`;
    });
    html+=`</div>`;
  }
  // Exam results with ANSWERS (only visible here)
  if(examResults.length){
    html+=`<div class="card"><div class="card-hdr">📝 Результаты тестов (с правильными ответами)</div>`;
    examResults.forEach(r=>{
      const ts=r.timestamp?.toDate?r.timestamp.toDate():new Date();
      const dateStr=ts.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
      const cls=r.pct>=80?'t-badge-ok':r.pct>=60?'t-badge-warn':'t-badge-err';
      html+=`<div class="t-row">
        <div style="flex:1">
          <div style="font-size:14px;font-weight:600">${r.section==='listening'?'듣기':'읽기'} — ${r.score}/${r.total} (${r.pct}%)</div>
          <div style="font-size:12px;color:var(--tx3)">${dateStr}</div>
        </div>
        <span class="t-badge ${cls}">${r.pct>=80?'✓ Хорошо':r.pct>=60?'~ Средне':'✗ Нужен повтор'}</span>
      </div>`;
    });
    html+=`</div>`;
    // Show correct answers for the exam
    html+=`<div class="card"><div class="card-hdr">✅ Правильные ответы — 제102회 TOPIK II</div>`;
    html+=`<div style="margin-bottom:12px"><strong>듣기 (1~50)</strong></div>`;
    html+=`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px">`;
    for(let i=1;i<=50;i++){
      const ans=EXAM.answers.listening[i];
      const chosen=examResults[0]?.answers?.['listening_'+i];
      const ok=chosen===ans;
      html+=`<div style="width:40px;height:36px;border-radius:var(--r);background:${chosen===undefined?'var(--sur2)':ok?'var(--grnl)':'var(--redl)'};border:1px solid ${chosen===undefined?'var(--bdrl)':ok?'var(--grnm)':'var(--red)'};display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;font-weight:700">
        <span style="color:var(--tx3)">${i}</span>
        <span style="color:${ok?'var(--grn)':'var(--red)'}">${['①','②','③','④'][ans-1]}</span>
      </div>`;
    }
    html+=`</div>`;
    html+=`<div style="margin-bottom:12px"><strong>읽기 (1~50)</strong></div>`;
    html+=`<div style="display:flex;flex-wrap:wrap;gap:6px">`;
    for(let i=1;i<=50;i++){
      const ans=EXAM.answers.reading[i];
      const chosen=examResults[0]?.answers?.['reading_'+i];
      const ok=chosen===ans;
      html+=`<div style="width:40px;height:36px;border-radius:var(--r);background:${chosen===undefined?'var(--sur2)':ok?'var(--grnl)':'var(--redl)'};border:1px solid ${chosen===undefined?'var(--bdrl)':ok?'var(--grnm)':'var(--red)'};display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;font-weight:700">
        <span style="color:var(--tx3)">${i}</span>
        <span style="color:${ok?'var(--grn)':'var(--red)'}">${['①','②','③','④'][ans-1]}</span>
      </div>`;
    }
    html+=`</div></div>`;
  }
  // Progress timeline
  html+=`<div class="card"><div class="card-hdr">📅 Пройденные дни</div>
    <div style="display:flex;flex-wrap:wrap;gap:4px">`;
  for(let d=1;d<=45;d++){
    const isDone=(studentData.done||[]).includes(d);
    const isRev=PLAN.review_days.includes(d);
    html+=`<div style="width:32px;height:32px;border-radius:6px;background:${isDone?'var(--grnl)':'var(--sur2)'};border:1px solid ${isDone?'var(--grnm)':'var(--bdrl)'};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:${isDone?'var(--grn)':isRev?'var(--pur)':'var(--tx3)'}">${d}</div>`;
  }
  html+=`</div></div>`;
  html+=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
    <button class="btn btn-sm" onclick="loadTeacherData()">🔄 Обновить</button>
    <button class="btn btn-sm btn-warn" onclick="S.teacherUnlocked=false;renderTeacherPage()">🔒 Выйти</button>
  </div>`;
  document.getElementById('content').innerHTML=html;
}

// ─── HELPERS ───
function markDone(day){S.done.add(day);buildSidebar();}
function showHint(btn,t){btn.style.display='none';const p=btn.nextElementSibling;if(p){p.textContent='💡 '+t;p.style.display='inline-block';}}
function showGModal(form){
  const g=GDB[form];if(!g)return;
  const ov=document.createElement('div');ov.className='modal-ov';ov.onclick=e=>{if(e.target===ov)ov.remove();};
  ov.innerHTML=`<div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
      <div><div style="font-size:20px;font-weight:700;color:var(--grn)">${form}</div><div style="font-size:13px;color:var(--tx3);font-style:italic">${g.translation}</div></div>
      <button onclick="this.closest('.modal-ov').remove()" style="font-size:22px;background:none;border:none;cursor:pointer;color:var(--tx3)">✕</button>
    </div>
    <div class="feel-box" style="margin-bottom:10px"><div class="feel-lbl">💡</div><div style="font-size:13px;line-height:1.6">${g.feel}</div></div>
    ${g.examples.map(ex=>`<div class="ex-item"><div class="ex-kr">${ex.kr}</div><div class="ex-ru">${ex.ru}</div></div>`).join('')}
  </div>`;
  document.body.appendChild(ov);
}
function attachHandlers(){
  setTimeout(()=>{
    const inp=document.getElementById('mi');
    if(inp){if(window.innerWidth>600)inp.focus();if(inp.tagName==='INPUT')inp.addEventListener('keydown',e=>{if(e.key==='Enter')checkAns();});}
    const ex=S.exPhase==='running'?S.exList[S.exIdx]:null;
    if(ex&&(ex.type==='listen-choice'||ex.type==='listen-fill')){const btn=document.getElementById('play-btn');setTimeout(()=>speakAndAnimate(ex.kr,btn),500);}
  },80);
}
function shuffle(a){return[...a].sort(()=>Math.random()-.5);}

// ─── GOOGLE SHEETS (backup) ───
async function sendToSheets(day,score,total){
  const SHEETS_URL="YOUR_APPS_SCRIPT_URL_HERE";
  if(!SHEETS_URL||SHEETS_URL.includes('YOUR'))return;
  const meta=PLAN.day_meta[day]||{};
  try{await fetch(SHEETS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:'Катя',day,topic:meta.topic||'',score,total})});}
  catch(e){}
}

// ─── INIT ───
loadLocal();
loadFromFirebase().then(()=>{ buildSidebar(); renderHome(); });
</script>
